version: 2
updates:
  # npm/pnpm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:00"
      timezone: "Africa/Lagos"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "security"
    ignore:
      # xlsx has no public patch — ignore until replacement is scoped
      - dependency-name: "xlsx"
        update-types: ["version-update:semver-patch"]
    groups:
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
      dev-toolchain:
        patterns:
          - "vite*"
          - "vitest*"
          - "esbuild*"
          - "drizzle-kit"
        update-types:
          - "minor"
          - "patch"
      radix-ui:
        patterns:
          - "@radix-ui/*"
      production-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "@aws-sdk/*"
          - "@radix-ui/*"
          - "vite*"
          - "vitest*"
          - "esbuild*"
          - "drizzle-kit"

  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "github-actions"
