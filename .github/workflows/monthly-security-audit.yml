name: Monthly Security Audit

on:
  schedule:
    - cron: "0 8 1 * *" # 08:00 UTC on the 1st of every month (~09:00 WAT)
  workflow_dispatch:

jobs:
  audit:
    name: pnpm audit report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security audit
        id: audit
        run: |
          echo "## NRCS EAM Security Audit — $(date '+%B %Y')" > audit-report.md
          echo "" >> audit-report.md
          echo "**Run date:** $(date '+%Y-%m-%d %H:%M UTC')" >> audit-report.md
          echo "**Branch:** ${{ github.ref_name }}" >> audit-report.md
          echo "**Commit:** ${{ github.sha }}" >> audit-report.md
          echo "" >> audit-report.md
          echo "### Audit Results" >> audit-report.md
          echo '```' >> audit-report.md
          pnpm audit --audit-level moderate 2>&1 >> audit-report.md || true
          echo '```' >> audit-report.md
        continue-on-error: true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-${{ github.run_number }}-${{ github.sha }}
          path: audit-report.md
          retention-days: 90

      - name: Post summary to job
        run: cat audit-report.md >> $GITHUB_STEP_SUMMARY

      - name: Fail if critical vulnerabilities found
        run: |
          CRITICAL=$(pnpm audit --audit-level critical --json 2>/dev/null | \
            node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{ \
            try{const r=JSON.parse(d);console.log(r.metadata?.vulnerabilities?.critical||0)}catch{console.log(0)}})")
          echo "Critical vulnerabilities: $CRITICAL"
          if [ "$CRITICAL" -gt "0" ]; then
            echo "❌ Critical vulnerabilities found — action required"
            exit 1
          else
            echo "✅ No critical vulnerabilities"
          fi
