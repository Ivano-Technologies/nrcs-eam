name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm check

      - name: Frontend production build
        run: pnpm build:frontend

      - name: Verify entry module graph
        run: node scripts/check/verify-entry-graph.mjs

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nrcs_eam_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nrcs_eam_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/nrcs_eam_test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Double bootstrap proves idempotency (existence guards; no CREATE OR REPLACE).
      - name: Bootstrap database (1/2)
        run: pnpm db:bootstrap

      - name: Capture bootstrap function hashes
        run: pnpm exec tsx scripts/db/hash-bootstrap-functions.ts > /tmp/bootstrap-funcs-before.txt

      - name: Bootstrap database (2/2 — idempotency)
        run: pnpm db:bootstrap

      - name: Verify bootstrap did not alter function bodies
        run: |
          pnpm exec tsx scripts/db/hash-bootstrap-functions.ts > /tmp/bootstrap-funcs-after.txt
          diff -u /tmp/bootstrap-funcs-before.txt /tmp/bootstrap-funcs-after.txt

      - name: Apply migrations
        run: pnpm exec drizzle-kit migrate

      - name: Seed database
        run: pnpm exec tsx scripts/db/seed-db.mjs

      - name: Run Vitest
        run: pnpm exec vitest run
